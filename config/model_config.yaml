# Model choice: "sonnet" for every role. Percy and Moody make nuanced, citation-bound
# policy judgments (including resisting adversarial injection) that Haiku is too weak
# for; Opus is unnecessary cost for this task's complexity at batch volume (50
# transactions x up to 2 LLM calls). Sonnet is the cost/quality balance point.
hermione:
  model: sonnet
  effort: low
  max_turns: 1

percy:
  model: sonnet
  effort: medium
  max_turns: 1

# Moody gets the highest effort: it's the last line of defense against injection and false positives.
moody:
  model: sonnet
  effort: high
  max_turns: 1

# Hermione's two new roles (issue #8): kept cheap/low-effort since decompose runs once
# per batch and escalation runs once per flagged transaction - the whole point is this
# shouldn't cost as much as the Moody review it's sometimes gating.
hermione_decompose:
  model: sonnet
  effort: low
  max_turns: 1

hermione_escalation:
  model: sonnet
  effort: low
  max_turns: 1
